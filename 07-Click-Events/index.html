<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listener Demo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; transition: background 0.3s; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.95); }
        .counter { font-size: 3rem; font-weight: bold; margin: 1rem 0; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Click Tracker</h2>
        <div class="counter">0</div>
        <button id="main-btn">Click Me!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Removing Elements Lab</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #f8f9fa; }
        .notification { 
            background: #fff; 
            border-left: 5px solid #dc3545; 
            padding: 15px 20px; 
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .close-btn { 
            background: #eee; 
            border: none; 
            padding: 5px 10px; 
            cursor: pointer; 
            border-radius: 3px;
        }
        .close-btn:hover { background: #ddd; }
    </style>
</head>
<body>

    <div id="notification-container">
        <div class="notification">
            <span>⚠️ System Update: Please restart your browser.</span>
            <button class="close-btn">Dismiss</button>
        </div>
        <div class="notification">
            <span>📧 New Message: You have 1 unread email.</span>
            <button class="close-btn">Dismiss</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

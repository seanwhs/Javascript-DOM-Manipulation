<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .counter-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 250px; }
        #count { font-size: 4rem; font-weight: bold; margin: 1rem 0; color: #333; }
        .buttons { display: flex; justify-content: space-between; gap: 10px; }
        button { flex: 1; padding: 10px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; transition: opacity 0.2s; }
        .btn-decrease { background: #dc3545; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        .btn-increase { background: #28a745; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2>Counter</h2>
        <div id="count">0</div>
        <div class="buttons">
            <button class="btn-decrease">-</button>
            <button class="btn-reset">Reset</button>
            <button class="btn-increase">+</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

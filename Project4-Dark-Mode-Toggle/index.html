<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 04: Dark Mode</title>
    <style>
        /* 1. Define Theme Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #2d3436;
            --card-bg: #f9f9f9;
            --btn-bg: #2d3436;
            --btn-text: #ffffff;
        }

        /* 2. Define Dark Mode Overrides */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f5f5f5;
            --card-bg: #2d2d2d;
            --btn-bg: #f5f5f5;
            --btn-text: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, sans-serif;
            transition: background-color 0.3s, color 0.3s; /* Smooth transition */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        #theme-toggle {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Theme Switcher</h1>
        <p>This setting will persist after a page refresh!</p>
        <button id="theme-toggle">Toggle Mode</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 03: Modal Popup</title>
    <style>
        /* 1. RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        button#open-modal {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #764ba2;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        button#open-modal:hover {
            transform: translateY(-3px);
        }

        /* 2. MODAL SYSTEM */
        .hidden {
            display: none !important;
        }

        /* The Overlay (Background) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px); /* Modern blur effect */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* The Modal Box */
        .modal {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .modal h2 {
            margin-bottom: 1rem;
            color: #2d3436;
        }

        .modal p {
            color: #636e72;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            background: none;
            border: none;
            color: #b2bec3;
            cursor: pointer;
        }

        .close-modal:hover { color: #2d3436; }

    </style>
</head>
<body>

    <button id="open-modal">🚀 Open Modal</button>

    <!-- Modal Overlay -->
    <div class="overlay hidden" id="modal-overlay">
        <div class="modal">
            <button class="close-modal" id="close-btn">&times;</button>
            <h2>Welcome!</h2>
            <p>You’ve successfully triggered a modal. You can close this by clicking the "X", clicking the background, or pressing the <strong>Escape</strong> key.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Creation Lab</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #fdfdfd; }
        .dynamic-list { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; color: #444; }
        button { cursor: pointer; padding: 8px 16px; border-radius: 4px; border: 1px solid #007bff; background: white; color: #007bff; font-weight: bold; }
        button:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="dynamic-list">
        <h3>Shopping List</h3>
        <ul id="list-container">
            <!-- New items will appear here -->
        </ul>
        <button id="add-item-btn">+ Add Item</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

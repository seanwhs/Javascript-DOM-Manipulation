<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling Demo</title>
    <style>
        body { 
            font-family: sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            background: #f8f9fa; 
        }
        .outer-div { 
            padding: 50px; 
            background: #dee2e6; 
            border: 2px solid #adb5bd; 
            border-radius: 12px;
        }
        button { 
            padding: 15px 30px; 
            font-size: 1.1rem; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="outer-div">
        <button id="main-btn">Click Me!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

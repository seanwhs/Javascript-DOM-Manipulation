<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Timers Lab</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; background: #f4f4f9; }
        .toast {
            background: #333; color: white; padding: 12px 24px; border-radius: 4px;
            position: fixed; top: 20px; transition: transform 0.3s ease, opacity 0.3s;
            transform: translateY(-100px); opacity: 0;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="notification" class="toast">Action Successful! ✅</div>
    <button id="trigger-btn">Run Task (2s Delay)</button>

    <script src="script.js"></script>
</body>
</html>

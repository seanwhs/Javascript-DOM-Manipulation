<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Event Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #2c3e50; color: white; margin: 0; }
        .display { font-size: 5rem; font-weight: bold; height: 120px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); padding: 20px 50px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); margin-bottom: 20px; min-width: 200px; }
        .info { font-size: 1.2rem; opacity: 0.8; }
        kbd { background: #eee; color: #333; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .highlight { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    </style>
</head>
<body>

    <div class="display" id="key-display">?</div>
    <div class="info">Press any key (Try <kbd>Enter</kbd>, <kbd>Esc</kbd>, or <kbd>Arrows</kbd>)</div>
    <p id="meta-info"></p>

    <script src="script.js"></script>
</body>
</html>

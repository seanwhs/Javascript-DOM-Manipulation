<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Theme Switcher</title>
    <style>
        :root { --bg: #ffffff; --text: #333333; }
        body.dark-mode { --bg: #1a1a1a; --text: #f0f0f0; }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: all 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 100px;
        }

        .card { border: 1px solid #ccc; padding: 2rem; border-radius: 8px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status">Current Theme: Light</h2>
        <button id="theme-toggle">Switch Theme</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

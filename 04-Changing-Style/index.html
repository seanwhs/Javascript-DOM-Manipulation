<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Styling Demo</title>
    <style>
        /* Base styles for the demo */
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .box { width: 100px; height: 100px; background: #eee; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Style Me via JS!</h1>
    <p class="description">JavaScript can change any CSS property using the <code>.style</code> object.</p>
    
    <div id="box-demo" class="box"></div>
    
    <script src="script.js"></script>
</body>
</html>
